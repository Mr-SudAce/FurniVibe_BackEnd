{% extends "dashboard/dashboard.html" %}

{% block content %}
<style>
    :root {
        --primary-color: #393939;
        --bg-body: #f4f7fe;
        --sidebar-bg: #ffffff;
        --text-main: #000000;
        --text-muted: rgba(0, 0, 0, 0.4);
        --card-shadow: 0px 18px 40px rgba(112, 144, 176, 0.12);
        --border-color: #eef2f6;
    }

    .profile-card {
        background: var(--sidebar-bg);
        border-radius: 24px;
        box-shadow: var(--card-shadow);
        border: 1px solid var(--border-color);
        padding: 3rem 2.5rem;
        max-width: 550px;
        margin: 2rem auto;
    }

    .profile-header h2 {
        font-weight: 800;
        font-size: 1.75rem;
        color: var(--primary-color);
        letter-spacing: -1px;
        margin-bottom: 0.5rem;
    }

    .profile-header p {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 2rem;
    }

    .form-label {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--primary-color);
        margin-bottom: 0.6rem;
        display: block;
    }

    /* Custom Input Styling to match the FurniVibe UI */
    .form-group input {
        display: block;
        width: 100%;
        padding: 0.9rem 1.1rem;
        font-size: 0.95rem;
        border: 1.5px solid var(--border-color);
        border-radius: 16px;
        background-color: #fff;
        color: var(--text-main);
        transition: all 0.2s ease;
        margin-bottom: 1.25rem;
    }

    .form-group input:focus {
        outline: 0;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(57, 57, 57, 0.05);
    }

    .btn-update {
        background-color: var(--primary-color);
        border: none;
        padding: 1rem;
        font-weight: 700;
        border-radius: 16px;
        color: #ffffff;
        width: 100%;
        margin-top: 0.5rem;
        transition: all 0.2s ease;
    }

    .btn-update:hover {
        opacity: 0.9;
        transform: translateY(-1px);
    }

    .btn-cancel {
        display: block;
        text-align: center;
        padding: 1rem;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
        margin-top: 0.5rem;
    }

    .btn-cancel:hover {
        color: var(--primary-color);
    }

    .error-text {
        color: #e53e3e;
        font-size: 0.8rem;
        margin-top: -1rem;
        margin-bottom: 1rem;
        font-weight: 500;
    }
</style>

<div class="container">
    <div class="profile-card">
        <div class="profile-header text-center">
            <h2>Change Password</h2>
            <p>Update your security credentials below</p>
        </div>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
            <div class="form-group">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}

                {% if field.errors %}
                <div class="error-text">
                    <i class="bi bi-exclamation-circle me-1"></i>
                    {{ field.errors|striptags }}
                </div>
                {% endif %}

            </div>
            {% endfor %}

            <div class="mt-4">
                <button type="submit" class="btn-update">Update
                    Password</button>
                <a href="{% url 'edit_profile' %}" class="btn-cancel">
                    Cancel and Go Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
