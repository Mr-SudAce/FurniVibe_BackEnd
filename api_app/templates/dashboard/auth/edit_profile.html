{% extends "dashboard/dashboard.html" %}

{% block content %}
<style>
    :root {
        --primary-color: #393939;
        --bg-body: #f4f7fe;
        --sidebar-bg: #ffffff;
        --text-main: #000000;
        --text-muted: rgba(0, 0, 0, 0.4);
        --card-shadow: 0px 18px 40px rgba(112, 144, 176, 0.12);
        --border-color: #eef2f6;
    }

    .profile-card {
        background: var(--sidebar-bg);
        border-radius: 20px;
        box-shadow: var(--card-shadow);
        border: 1px solid var(--border-color);
        padding: 2.5rem;
        max-width: 700px;
        margin: 2rem auto;
    }

    .profile-header h2 {
        font-weight: 800;
        color: var(--primary-color);
        letter-spacing: -1px;
    }

    .form-label {
        font-size: 0.85rem;
        font-weight: 700;
        color: var(--primary-color);
        margin-bottom: 0.5rem;
    }

    .form-control-custom {
        display: block;
        width: 100%;
        padding: 0.85rem 1.1rem;
        font-size: 0.95rem;
        border: 1.5px solid var(--border-color);
        border-radius: 12px;
        margin-bottom: 1.2rem;
        transition: all 0.2s ease;
    }

    .form-control-custom:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(57, 57, 57, 0.05);
    }

    .btn-save {
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 0.8rem 2rem;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: opacity 0.2s;
    }

    .btn-save:hover { opacity: 0.9; }

    .btn-pw {
        color: var(--primary-color);
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 600;
    }
</style>

<div class="container">
    <div class="profile-card">
        <div class="profile-header d-flex justify-content-between align-items-center mb-4">
            <h2>Account Settings</h2>
            <a href="{% url 'update_pw' %}" class="btn-pw">
                <i class="bi bi-key me-1"></i> Change Password
            </a>
        </div>

        <form method="post">
            {% csrf_token %}
            
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">Username</label>
                    {{ form.username }}
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email Address</label>
                    {{ form.email }}
                </div>
            </div>

            <div class="row mt-2">
                <div class="col-md-6">
                    <label class="form-label">First Name</label>
                    {{ form.first_name }}
                </div>
                <div class="col-md-6">
                    <label class="form-label">Last Name</label>
                    {{ form.last_name }}
                </div>
            </div>

            <hr class="my-4" style="border-top: 1px solid var(--border-color);">

            <div class="d-flex justify-content-end">
                <button type="submit" class="btn-save">Save Changes</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
