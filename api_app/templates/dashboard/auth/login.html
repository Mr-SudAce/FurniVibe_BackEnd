<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | FurniVibe</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --primary: #1a1a1a;
            --primary-hover: #333333;
            --bg-body: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --error: #ef4444;
            --border: #e2e8f0;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; transition: all 0.2s ease-in-out; }

        body { 
            background: radial-gradient(circle at top right, #e2e8f0, var(--bg-body));
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
            padding: 20px;
        }

        .login-card { 
            width: 100%; 
            max-width: 440px; 
            padding: 3rem 2.5rem; 
            border-radius: 28px; 
            background: var(--card-bg); 
            box-shadow: var(--shadow); 
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        .login-header { text-align: center; margin-bottom: 2rem; }
        .login-header h2 { font-weight: 800; font-size: 2.2rem; color: var(--primary); margin: 0; letter-spacing: -1px; }
        .login-header p { color: var(--text-muted); margin-top: 0.5rem; font-size: 0.95rem; }

        .form-group { margin-bottom: 1.25rem; position: relative; }
        .form-label { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--primary); display: block; }
        
        .input-wrapper { position: relative; }
        .input-wrapper i { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .form-group input { 
            display: block; 
            width: 100%; 
            padding: 0.8rem 1rem 0.8rem 2.8rem; 
            border: 2px solid var(--border); 
            border-radius: 14px; 
            font-size: 0.95rem;
            background: #fdfdfd;
        }

        .form-group input:focus { 
            outline: 0; 
            border-color: var(--primary); 
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0,0,0,0.05);
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
        }

        .btn-login { 
            background-color: var(--primary); 
            border: none; 
            padding: 1rem; 
            font-weight: 700; 
            border-radius: 14px; 
            color: #ffffff; 
            width: 100%; 
            cursor: pointer; 
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-login:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

        .error-alert { 
            background-color: #fef2f2; 
            color: var(--error); 
            padding: 0.9rem; 
            border-radius: 14px; 
            font-size: 0.85rem; 
            margin-bottom: 1.5rem; 
            display: none; 
            align-items: center; 
            border: 1px solid #fee2e2; 
        }

        .footer-text { text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-muted); }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 700; }
        .footer-text a:hover { text-decoration: underline; }

        /* Spinner Animation */
        .spinner { display: none; width: 18px; height: 18px; border: 2px solid #ffffff; border-bottom-color: transparent; border-radius: 50%; animation: rotation 1s linear infinite; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h2>Sign In</h2>
            <p>Admin Control Panel</p>
        </div>

        <div id="errorBox" class="error-alert">
            <i class="bi bi-exclamation-circle-fill" style="margin-right: 10px;"></i>
            <span id="errorText"></span>
        </div>

        <form id="furniLoginForm">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <i class="bi bi-person"></i>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <i class="bi bi-lock"></i>
                    <input type="password" id="password" placeholder="Enter password" required>
                    <i class="bi bi-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-login" id="submitBtn">
                <span class="spinner" id="btnSpinner"></span>
                <span id="btnText">Log In</span>
            </button>
        </form>

        <div class="footer-text"> 
            Don't have an account? <a href="{% url 'dashboard_register' %}">Create one</a>
        </div>
    </div>

    <script>
        // Password Visibility Toggle
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('bi-eye');
            this.classList.toggle('bi-eye-slash');
        });

        // Form Submission
        document.getElementById('furniLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('btnSpinner');
            const errorBox = document.getElementById('errorBox');
            const errorText = document.getElementById('errorText');
            
            // UI Loading State
            errorBox.style.display = 'none';
            btnText.innerText = "Authenticating...";
            spinner.style.display = "block";
            btn.disabled = true;

            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                // Using dynamic Django URL
                const response = await fetch("{% url 'dashboard_login' %}", { 
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json',
                        'Content-Type': 'application/json',
                        'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    window.location.href = data.redirect_url; 
                } else {
                    throw new Error(data.detail || "Invalid credentials.");
                }
            } catch (err) {
                errorBox.style.display = 'flex';
                errorText.innerText = err.message || "Connection error.";
                btnText.innerText = "Log In";
                spinner.style.display = "none";
                btn.disabled = false;
            }
        });
    </script>

</body>
</html>
