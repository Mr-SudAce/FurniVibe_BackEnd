<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Login | FurniVibe</title>

        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

        <style>
        :root {
            /* Your Exact Palette from main.css */
            --primary-color: #393939;
            --bg-body: #f4f7fe;
            --sidebar-bg: #ffffff;
            --text-main: #000000;
            --text-muted: rgba(0, 0, 0, 0.4); 
            --card-shadow: 0px 18px 40px rgba(112, 144, 176, 0.12);
            --border-color: #eef2f6;
        }

        * {
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body { 
            background-color: var(--bg-body);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            color: var(--text-main);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 3.5rem 2.5rem;
            border-radius: 24px;
            background: var(--sidebar-bg);
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .login-header h2 {
            font-weight: 800;
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.6rem;
            color: var(--primary-color);
            display: block;
        }

        /* Styling Django form inputs */
        .form-group input {
            display: block;
            width: 100%;
            padding: 0.9rem 1.1rem;
            font-size: 0.95rem;
            border: 1.5px solid var(--border-color);
            border-radius: 16px;
            background-color: #fff;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .form-group input:focus {
            outline: 0;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(57, 57, 57, 0.05);
        }

        .btn-login {
            background-color: var(--primary-color);
            border: none;
            padding: 1rem;
            font-weight: 700;
            border-radius: 16px;
            color: #ffffff;
            width: 100%;
            margin-top: 1rem;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.1s ease, opacity 0.2s ease;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .error-alert {
            background-color: #fff5f5;
            color: #e53e3e;
            padding: 1rem;
            border-radius: 16px;
            font-size: 0.85rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            border: 1px solid #fed7d7;
            font-weight: 600;
        }

        .forgot-link {
            font-size: 0.85rem;
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 700;
        }

        .footer-text {
            text-align: center;
            margin-top: 2.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .footer-text a {
            color: var(--primary-color);
            font-weight: 800;
            text-decoration: none;
        }
    </style>
    </head>
    <body>

        <div class="login-card">
            <div class="login-header">
                <h2>Sign In</h2>
                <p>Enter your credentials to access FurniVibe</p>
            </div>

            {% if form.errors %}
            <div class="error-alert">
                <i class="bi bi-shield-exclamation me-2"
                    style="font-size: 1.1rem;"></i>
                Invalid username or password.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-label">Username</label>
                    {{ form.username }}
                </div>

                <div class="form-group">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem;">
                        <label class="form-label"
                            style="margin-bottom: 0;">Password</label>
                        <a href="{% url 'password_reset' %}"
                            class="forgot-link">Forgot?</a>
                    </div>
                    {{ form.password }}
                </div>

                <button type="submit" class="btn-login">
                    Sign In
                </button>
            </form>

            <div class="footer-text">
                Not registered yet? <a
                    href="{% url 'dashboard_register' %}">Create an Account</a>
            </div>
        </div>

    </body>
</html>
