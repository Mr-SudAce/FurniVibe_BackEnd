<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin Login | FurniVibe</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
            rel="stylesheet">
        <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
        <style>
        :root {
            --primary-color: #393939; --bg-body: #f4f7fe; --sidebar-bg: #ffffff;
            --text-main: #000000; --text-muted: rgba(0, 0, 0, 0.4); 
            --card-shadow: 0px 18px 40px rgba(112, 144, 176, 0.12); --border-color: #eef2f6;
        }
        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-body); height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .login-card { width: 100%; max-width: 420px; padding: 3.5rem 2.5rem; border-radius: 24px; background: var(--sidebar-bg); box-shadow: var(--card-shadow); border: 1px solid var(--border-color); }
        .login-header { text-align: center; margin-bottom: 2.5rem; }
        .login-header h2 { font-weight: 800; font-size: 2rem; color: var(--primary-color); margin-bottom: 0.5rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-label { font-size: 0.85rem; font-weight: 700; margin-bottom: 0.6rem; color: var(--primary-color); display: block; }
        .form-group input { display: block; width: 100%; padding: 0.9rem 1.1rem; border: 1.5px solid var(--border-color); border-radius: 16px; transition: all 0.2s ease; }
        .form-group input:focus { outline: 0; border-color: var(--primary-color); }
        .btn-login { background-color: var(--primary-color); border: none; padding: 1rem; font-weight: 700; border-radius: 16px; color: #ffffff; width: 100%; cursor: pointer; }
        .error-alert { background-color: #fff5f5; color: #e53e3e; padding: 1rem; border-radius: 16px; font-size: 0.85rem; margin-bottom: 1.5rem; display: none; align-items: center; border: 1px solid #fed7d7; }
    </style>
    </head>
    <body>
        <div class="login-card">
            <div class="login-header">
                <h2>Sign In</h2>
                <p>Access the FurniVibe Dashboard</p>
            </div>

            <div id="errorBox" class="error-alert">
                <i class="bi bi-shield-exclamation me-2"></i>
                <span id="errorText"></span>
            </div>

            <form id="furniLoginForm">
                {% csrf_token %}
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="username"
                        placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password"
                        placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn-login" id="submitBtn">
                    Log In</button>
            </form>
            <div class="mt-4 text-center"> 
                Don't have account? <a href="{% url 'dashboard_register' %}">Register</a>
            </div>
        </div>

        <script>
            document.getElementById('furniLoginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const errorBox = document.getElementById('errorBox');
        const errorText = document.getElementById('errorText');
        
        btn.innerText = "Authenticating...";
        btn.disabled = true;

        const payload = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        };

        try {
            const response = await fetch('/login/', { 
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                // Save tokens for future API use
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);
                window.location.href = data.redirect_url; 
            } else {
                errorBox.style.display = 'flex';
                errorText.innerText = data.detail || "Access Denied.";
                btn.innerText = "Log In";
                btn.disabled = false;
            }
        } catch (err) {
            console.error("Login Error:", err);
            errorBox.style.display = 'flex';
            errorText.innerText = "Connection error.";
            btn.innerText = "Log In";
            btn.disabled = false;
        }
    });
        </script>

    </body>
</html>
