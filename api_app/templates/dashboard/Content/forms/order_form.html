{% extends 'dashboard/base_form.html' %}

{% block form_title %}Update Order{% endblock %}
{% block back_url %}{% url 'order_list' %}{% endblock %}

{% block main_fields %}
<div class="mb-3">
    <label class="form-label">Order Status</label>
    {{ form.status }}
</div>

<div class="mb-3">
    <label class="form-label">Delivery Type</label>
    {{ form.delivery_type }}
</div>
{% endblock %}

{% block side_fields %}
<div class="mb-3">
    <label class="form-label">User</label>
    <input type="text" class="form-control" value="{{ order.user.username }}" readonly>
</div>

<div class="mb-3">
    <label class="form-label">Shipping Address</label>
    <textarea class="form-control" rows="3" readonly>{{ order.shipping_address }}</textarea>
</div>
{% endblock %}
